version: "3.8"

services:
  # Base de données
  db:
    image: postgis/postgis:15-3.3-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-mobility_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    networks:
      - dev-network
    restart: always

  # Backend (Mode Développement avec Nodemon)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Commande magique pour le hot-reload
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules # Astuce pour ne pas écraser les node_modules du conteneur
    environment:
      DATABASE_URL: postgres://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-mobility_db}
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - dev-network
    depends_on:
      - db

  # Frontend (Mode Développement avec Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build-stage
    # --host est obligatoire pour accéder à Vite depuis l'extérieur du Docker
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
    networks:
      - dev-network

networks:
  dev-network:

volumes:
  pgdata-dev:
