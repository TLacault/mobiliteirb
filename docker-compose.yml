services:
  db:
    image: postgis/postgis:15-3.3-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-mobility_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    networks:
      - dev-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-mobility_db}
      PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - dev-network
    depends_on:
      - db

  studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build-stage
    command: npx prisma studio --hostname 0.0.0.0 --port 5555
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: postgres://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-mobility_db}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - dev-network
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build-stage
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    ports:
      - "8080:8080"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:3001/api/v1
    networks:
      - dev-network

networks:
  dev-network:

volumes:
  pgdata-dev:
